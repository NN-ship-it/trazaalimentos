spring:
  application:
    name: trazaalimentos-backend
  datasource:
    url: jdbc:mysql://localhost:3306/trazaalimentos
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  mvc:
    cors:
      allowed-origins: http://localhost:3000
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true

server:
  port: 8080
  servlet:
    context-path: /api

# JWT Configuration
jwt:
  secret: your-super-secret-key-change-this-in-production-min-32-chars
  expiration: 86400000 # 24 horas en milisegundos

# Logging
logging:
  level:
    root: INFO
    com.trazaalimentos: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
